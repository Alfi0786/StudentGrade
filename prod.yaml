services:
  - type: web
    name: razor-dotnet-app
    runtime: dotnet
    plan: free

    buildCommand: dotnet publish -c Release -o out
    startCommand: dotnet out/StudentGrade.dll

    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production

      - key: ASPNETCORE_URLS
        value: http://0.0.0.0:10000

      - key: ConnectionStrings__DefaultConnection
        sync: false
